services:
  bam-bo:
    build: .
    environment:
      DATABASE_URL: postgres://bambo:bambo@postgres:5432/bambo?sslmode=disable
    ports:
      - "8085:8085"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bambo
      POSTGRES_USER: bambo
      POSTGRES_PASSWORD: bambo
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bambo -d bambo"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
